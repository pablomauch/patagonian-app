    function getSessionDate(weekNum, dayIndex) {
      const d = new Date(PLAN_START);
      d.setDate(d.getDate() + (weekNum - 1) * 7 + dayIndex);
      return d;
    }
    function getCurrentWeekNum() {
      const now = new Date(); now.setHours(0,0,0,0);
      const diff = now - PLAN_START;
      const w = Math.floor(diff / (7 * 86400000)) + 1;
      return Math.max(1, Math.min(26, w));
    }
    function daysToRace() {
      const now = new Date(); now.setHours(0,0,0,0);
      const race = new Date(RACE_DATE); race.setHours(0,0,0,0);
      return Math.ceil((race - now) / 86400000);
    }
    function getPhase(w) {
      return PHASES.find(p => w >= p.weeks[0] && w <= p.weeks[1]) || PHASES[0];
    }

    function SessionDetail({ session, log, onBack, onSave, onUncomplete }) {
      const tBase = TYPES[session.type];

              {t.structure.map((section, si) => {
                const isLast = si === t.structure.length - 1;
                const dotColor = si === 0 || isLast ? "#888" : t.color;
                const repeatItems = section.items.filter(i => i.repeat);
                const normalItems = section.items.filter(i => !i.repeat);
                const warmupKm = t.structure[0]?.items[0]?.fixedKm ?? 0;
                const cooldownKm = t.structure[t.structure.length-1]?.items[0]?.fixedKm ?? 0;
                const repeatKmInSection = section.items.filter(i => i.repeat && i.duration && i.duration.includes("km")).reduce((s,i) => s + parseFloat(i.duration)*4, 0);
                const mainKm = session.km && isRun ? Math.max(0, session.km - warmupKm - cooldownKm - repeatKmInSection) : null;

                  <div key={si} style={{ marginBottom: isLast ? 0 : 20 }}>

                        <div key={ii} style={{ display:"flex", alignItems:"center", background: item.isMain ? `${t.color}15` : "#F5F5F5", borderRadius:10, padding:"13px 14px", marginLeft:18, marginBottom:4 }}>

                    {isRun && (

                    </div>

          {session.type !== "rest" && (
            <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, padding:"12px 20px 28px", background:"#fff", borderTop:"1px solid #F0F0F0" }}>

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [logs, setLogs] = useState(() => loadLogs());
      const [activeTab, setActiveTab] = useState("plan");
      const [selectedSession, setSelectedSession] = useState(null);
      const [filterPhase, setFilterPhase] = useState(null);

      const handleSave = (weekNum, dayIndex, logData) => {
        const key = `w${weekNum}-d${dayIndex}`;
        let newLogs;
        if (logData === null) { newLogs = { ...logs }; delete newLogs[key]; }
        else { newLogs = { ...logs, [key]: logData }; }
        setLogs(newLogs);
        saveLogs(newLogs);
      };

      const currentWeek = getCurrentWeekNum();
      const today = new Date(); today.setHours(0,0,0,0);

      const allSessions = [];
      WEEKS_PLAN.forEach(wk => {
        wk.sessions.forEach(s => {
          const date = getSessionDate(wk.w, s.day); date.setHours(0,0,0,0);
          const key = `w${wk.w}-d${s.day}`;
          allSessions.push({ ...s, week:wk.w, date, key, log:logs[key], kmPlan:wk.kmPlan, recovery:wk.recovery, phase:getPhase(wk.w), isToday:date.getTime()===today.getTime(), isPast:date<today });
        });
      });

      const completedRuns = allSessions.filter(s => s.log?.status==="done" && s.type!=="rest").length;
      const totalRuns = allSessions.filter(s => s.type!=="rest").length;
      const totalLoggedKm = allSessions.reduce((sum,s) => sum + (s.log?.km ? parseFloat(s.log.km) : 0), 0);

      if (selectedSession) {
        return <SessionDetail session={selectedSession} log={selectedSession.log} onBack={() => setSelectedSession(null)}
          onSave={(logData) => { handleSave(selectedSession.week, selectedSession.day, logData); setSelectedSession(null); }}
          onUncomplete={() => { handleSave(selectedSession.week, selectedSession.day, null); setSelectedSession(null); }} />;
      }

      const weeksToShow = filterPhase ? WEEKS_PLAN.filter(w => w.w >= filterPhase.weeks[0] && w.w <= filterPhase.weeks[1]) : WEEKS_PLAN;

      const SessionRow = ({ s, wk, compact }) => {
        const date = getSessionDate(wk.w, s.day); date.setHours(0,0,0,0);
        const t = TYPES[s.type];
        const key = `w${wk.w}-d${s.day}`;
        const log = logs[key];
        const isToday = date.getTime() === today.getTime();
        const isPastDay = date < today;
        const isRest = s.type === "rest";
        const phase = getPhase(wk.w);
        const fullSession = { ...s, week:wk.w, date, key, log, phase };
        return (
          <div onClick={() => !isRest && setSelectedSession(fullSession)}
            style={{ display:"flex", alignItems:"center", padding: compact ? "10px 16px" : "12px 20px", borderBottom:"1px solid #F5F5F5", background: isToday?"#EBF4FF":"#fff", cursor: isRest?"default":"pointer", opacity: isRest?0.35:1 }}>
            <div style={{ width: compact?38:44, flexShrink:0, textAlign:"center" }}>
              <div style={{ fontSize:10, fontWeight:700, color: isToday?"#1B6CA8":"#BBB", textTransform:"uppercase" }}>{DAY_NAMES[s.day]}</div>
              <div style={{ fontSize: compact?15:18, fontWeight:800, color: isToday?"#1B6CA8":isPastDay?"#BBB":"#222" }}>{date.getDate()}</div>
              {!compact && <div style={{ fontSize:10, color:"#CCC" }}>{MONTHS[date.getMonth()]}</div>}
            </div>
            <div style={{ width:1, height:36, background:"#EEE", margin: compact?"0 10px":"0 14px", flexShrink:0 }} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize: compact?13:15, fontWeight:700, color: isPastDay&&!isToday?"#888":"#111", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.icon} {s.detail || t.title}</div>
              <div style={{ fontSize:11, color:"#AAA", marginTop:1 }}>{s.km ? `${s.km} km · ` : ""}{t.subtitle}</div>
            </div>
            <div style={{ flexShrink:0, marginLeft:8, display:"flex", alignItems:"center", gap:4 }}>
              {log?.status==="done" && <div style={{ width:20, height:20, borderRadius:10, background:"#2A9D8F", display:"flex", alignItems:"center", justifyContent:"center" }}><span style={{ color:"#fff", fontSize:11, fontWeight:800 }}>✓</span></div>}
              {log?.status==="skipped" && <div style={{ width:20, height:20, borderRadius:10, background:"#E76F51", display:"flex", alignItems:"center", justifyContent:"center" }}><span style={{ color:"#fff", fontSize:11, fontWeight:800 }}>✗</span></div>}
              {!log && !isRest && <div style={{ width:20, height:20, borderRadius:10, border:"1.5px solid #DDD" }} />}
              {!isRest && <span style={{ color:"#DDD", fontSize:14 }}>›</span>}
            </div>
          </div>
        );
      };

      return (
        <div style={{ fontFamily:"'Helvetica Neue',Arial,sans-serif", background:"#F2F2F7", minHeight:"100vh", maxWidth:430, margin:"0 auto" }}>
          <div style={{ background:"#fff", padding:"16px 20px 0", borderBottom:"1px solid #F0F0F0", position:"sticky", top:0, zIndex:50 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
              <div>
                <div style={{ fontSize:11, color:"#2A9D8F", fontWeight:800, letterSpacing:2, textTransform:"uppercase" }}>Patagonian 2026</div>
                <div style={{ fontSize:20, fontWeight:800, color:"#111", letterSpacing:-0.5 }}>Plan de Maratón 42K</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:28, fontWeight:900, color:"#E76F51", lineHeight:1 }}>{daysToRace()}</div>
                <div style={{ fontSize:9, color:"#AAA", fontWeight:700, letterSpacing:1 }}>DÍAS</div>
              </div>
            </div>
            <div style={{ display:"flex" }}>
              {["plan","resumen"].map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)} style={{ flex:1, padding:"10px 0", border:"none", background:"transparent", borderBottom: activeTab===tab?"2px solid #1B2A4A":"2px solid transparent", color: activeTab===tab?"#111":"#999", fontWeight: activeTab===tab?700:500, fontSize:14, cursor:"pointer" }}>
                  {tab === "plan" ? "Esta semana" : "Generalidades"}
                </button>
              ))}
            </div>
          </div>

          <div style={{ paddingBottom:80 }}>
            {activeTab === "plan" && (() => {
              const wk = WEEKS_PLAN.find(w => w.w === currentWeek);
              if (!wk) return null;
              const phase = getPhase(wk.w);
              const ws = getSessionDate(wk.w, 0), we = getSessionDate(wk.w, 6);
              const weekSessions = allSessions.filter(s => s.week === wk.w && s.type !== "rest");
              const doneCount = weekSessions.filter(s => s.log?.status === "done").length;
              return (
                <>
                  <div style={{ margin:"12px 16px 4px", background:"#fff", borderRadius:14, padding:"16px 18px", border:"1px solid #F0F0F0" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                      <div>
                        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                          <span style={{ fontSize:18, fontWeight:800, color:"#1B2A4A" }}>Semana {wk.w}</span>
                          {wk.recovery && <span style={{ fontSize:10, background:"#FEF3E7", color:"#E76F51", padding:"2px 8px", borderRadius:10, fontWeight:700 }}>ALIVIO</span>}
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                          <div style={{ width:8, height:8, borderRadius:4, background:phase.color }} />
                          <span style={{ fontSize:12, color:"#888" }}>{phase.name}</span>
                        </div>
                        <div style={{ fontSize:12, color:"#BBB", marginTop:2 }}>{MONTHS[ws.getMonth()]} {ws.getDate()} – {MONTHS[we.getMonth()]} {we.getDate()}</div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:22, fontWeight:900, color:"#1B2A4A" }}>{wk.kmPlan} <span style={{ fontSize:13, fontWeight:400, color:"#AAA" }}>km</span></div>
                        <div style={{ fontSize:12, color: doneCount===weekSessions.length?"#2A9D8F":"#AAA", fontWeight:600 }}>{doneCount}/{weekSessions.length} sesiones</div>
                        <div style={{ marginTop:6, width:80, height:4, background:"#F0F0F0", borderRadius:2, marginLeft:"auto" }}>
                          <div style={{ height:"100%", width:`${weekSessions.length>0?(doneCount/weekSessions.length)*100:0}%`, background:"#2A9D8F", borderRadius:2 }} />
                        </div>
                      </div>
                    </div>
                  </div>
                  <div style={{ background:"#fff" }}>
                    {wk.sessions.map((s, si) => <SessionRow key={si} s={s} wk={wk} compact={false} />)}
                  </div>
                </>
              );
            })()}

            {activeTab === "resumen" && (
              <div style={{ paddingBottom:8 }}>
                <div style={{ padding:"12px 16px 0", display:"flex", flexDirection:"column", gap:10 }}>
                  <div style={{ background:"#1B2A4A", borderRadius:14, padding:"16px 18px", color:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontSize:11, color:"#7A9BB5", fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>Torres del Paine · 5 Sep 2026</div>
                      <div style={{ fontSize:13, color:"#A8C4D8", marginTop:2 }}>Semana {currentWeek} de 26 · {getPhase(currentWeek).name}</div>
                      <div style={{ marginTop:8, width:160, height:4, background:"rgba(255,255,255,0.1)", borderRadius:2 }}>
                        <div style={{ height:"100%", width:`${(currentWeek/26)*100}%`, background:"#2A9D8F", borderRadius:2 }} />
                      </div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:40, fontWeight:900, color:"#E76F51", lineHeight:1 }}>{daysToRace()}</div>
                      <div style={{ fontSize:10, color:"#7A9BB5", fontWeight:700, letterSpacing:1 }}>DÍAS</div>
                    </div>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    {[
                      { label:"Completadas", value:`${completedRuns}/${totalRuns}`, color:"#2A9D8F" },
                      { label:"KM registrados", value:`${totalLoggedKm.toFixed(0)} km`, color:"#1B6CA8" },
                      { label:"Adherencia", value:`${totalRuns>0?Math.round(completedRuns/totalRuns*100):0}%`, color:"#1B2A4A" },
                      { label:"Semanas restantes", value:`${Math.ceil(daysToRace()/7)}`, color:"#E76F51" },
                    ].map(s => (
                      <div key={s.label} style={{ background:"#fff", borderRadius:12, padding:"14px 14px" }}>
                        <div style={{ fontSize:22, fontWeight:900, color:s.color }}>{s.value}</div>
                        <div style={{ fontSize:11, color:"#888", marginTop:2 }}>{s.label}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ padding:"14px 16px 8px" }}>
                  <div style={{ fontSize:11, fontWeight:800, color:"#888", textTransform:"uppercase", letterSpacing:1.5, marginBottom:10 }}>Ver sesiones</div>
                  <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:4 }}>
                    <button onClick={() => setFilterPhase(null)} style={{ padding:"7px 16px", borderRadius:20, border:"none", flexShrink:0, background:!filterPhase?"#1B2A4A":"#E8E8E8", color:!filterPhase?"#fff":"#555", fontWeight:700, fontSize:12, cursor:"pointer" }}>Todo el plan</button>
                    <button onClick={() => setFilterPhase({ id:"current", weeks:[currentWeek,currentWeek] })} style={{ padding:"7px 16px", borderRadius:20, border:"none", flexShrink:0, background:filterPhase?.id==="current"?"#2A9D8F":"#E8E8E8", color:filterPhase?.id==="current"?"#fff":"#555", fontWeight:700, fontSize:12, cursor:"pointer" }}>Semana actual</button>
                    {PHASES.map(p => (
                      <button key={p.id} onClick={() => setFilterPhase(filterPhase?.id===p.id?null:p)} style={{ padding:"7px 16px", borderRadius:20, border:"none", flexShrink:0, background:filterPhase?.id===p.id?p.color:"#E8E8E8", color:filterPhase?.id===p.id?"#fff":"#555", fontWeight:700, fontSize:12, cursor:"pointer" }}>{p.label}</button>
                    ))}
                  </div>
                </div>
                {weeksToShow.map(wk => {
                  const phase = getPhase(wk.w);
                  const ws = getSessionDate(wk.w,0), we = getSessionDate(wk.w,6);
                  const weekSessions = allSessions.filter(s => s.week===wk.w && s.type!=="rest");
                  const doneCount = weekSessions.filter(s => s.log?.status==="done").length;
                  const isCurrent = wk.w === currentWeek;
                  const isPast = wk.w < currentWeek;
                  return (
                    <div key={wk.w} style={{ marginTop:2 }}>
                      <div style={{ padding:"12px 20px 8px", background:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center", borderTop:"6px solid #F2F2F7" }}>
                        <div>
                          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:2 }}>
                            <span style={{ fontSize:15, fontWeight:800, color: isCurrent?"#1B2A4A":isPast?"#AAA":"#333" }}>
                              Semana {wk.w}
                              {isCurrent && <span style={{ marginLeft:6, fontSize:10, background:"#1B2A4A", color:"#fff", padding:"2px 8px", borderRadius:10, fontWeight:700 }}>ACTUAL</span>}
                              {wk.recovery && <span style={{ marginLeft:6, fontSize:10, background:"#FEF3E7", color:"#E76F51", padding:"2px 8px", borderRadius:10, fontWeight:700 }}>ALIVIO</span>}
                            </span>
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                            <div style={{ width:7, height:7, borderRadius:4, background:phase.color }} />
                            <span style={{ fontSize:11, color:"#AAA" }}>{phase.name} · {MONTHS[ws.getMonth()]} {ws.getDate()} – {MONTHS[we.getMonth()]} {we.getDate()}</span>
                          </div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:16, fontWeight:800, color:isPast?"#AAA":"#111" }}>{wk.kmPlan} km</div>
                          <div style={{ fontSize:11, color:"#AAA" }}>{doneCount}/{weekSessions.length}</div>
                        </div>
                      </div>
                      <div style={{ background:"#fff" }}>
                        {wk.sessions.map((s, si) => <SessionRow key={si} s={s} wk={wk} compact={true} />)}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:"#fff", borderTop:"1px solid #E8E8E8", display:"flex", padding:"8px 0 16px", zIndex:50 }}>
            {[{id:"plan",icon:"📅",label:"Esta semana"},{id:"resumen",icon:"📊",label:"Generalidades"}].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ flex:1, background:"none", border:"none", cursor:"pointer", padding:"4px 0", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                <span style={{ fontSize:22 }}>{tab.icon}</span>
                <span style={{ fontSize:10, fontWeight:700, color: activeTab===tab.id?"#1B2A4A":"#AAA" }}>{tab.label}</span>
                {activeTab===tab.id && <div style={{ width:20, height:2, background:"#1B2A4A", borderRadius:1 }} />}
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
